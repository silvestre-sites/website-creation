# wrangler.toml
# Configuration for the Edge API Worker

name = "lead-marketplace-api"
main = "src/index.ts"
compatibility_date = "2026-06-11"

# Cloudflare D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "prod-silvestre-db"
database_id = "446ee8b9-0313-4d28-b6d4-3fb44470ffcd"
migrations_dir = "./"

[vars]
JWT_SECRET = "change-this-to-a-secure-secret-key-in-cloudflare-dashboard"
